<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Magia Ancestral - Uma Decisão sobre o Futuro da Magia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" id="gameContainer">
        <div class="hogwarts-header">
            <h1>⚡ HERANÇA DAS TREVAS ⚡</h1>
            <p>O futuro da magia ancestral está em suas mãos</p>
        </div>

        <div class="timer-card">
            <span class="timer-label">🔮 Tempo até o feitiço definitivo:</span>
            <span class="timer-digits" id="timerDisplay">06:00:00</span>
        </div>

        <div id="dynamicContent">
            <!-- Conteúdo será injetado pelo JS -->
        </div>
        <footer>✧ Magia não controlada pode corromper até o mais nobre dos corações ✧</footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
